spring:
  datasource:
    url: jdbc:h2:mem:thepiratemax;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
app:
  auth:
    enabled: false
    jwt:
      secret: test-test-test-test-test-test-test-test
      expiration-hours: 24
  integrations:
    mercado-pago:
      gateway: fake
      access-token: test-token
      webhook-secret: test-secret
      base-url: https://api.mercadopago.com
      notification-url: https://thepiratemax.test/api/webhooks/mercadopago
      pix-expiration-minutes: 30
  redis:
    credentials-delivery-queue: credentials.delivery
