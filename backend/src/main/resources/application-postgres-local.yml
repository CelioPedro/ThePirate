spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/the_pirate_max}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
app:
  auth:
    enabled: true
  integrations:
    mercado-pago:
      webhook-signature-validation-enabled: ${MERCADO_PAGO_WEBHOOK_SIGNATURE_VALIDATION_ENABLED:false}
