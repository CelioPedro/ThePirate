spring:
  application:
    name: the-pirate-max-backend
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/the_pirate_max}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level requestId=%X{requestId:-na} logger=%logger{36} - %msg%n"
app:
  auth:
    enabled: ${AUTH_ENABLED:true}
    jwt:
      secret: ${AUTH_JWT_SECRET:the-pirate-max-local-jwt-secret-2026-very-strong-key}
      expiration-hours: ${AUTH_JWT_EXPIRATION_HOURS:24}
  dev:
    default-user-email: ${DEV_DEFAULT_USER_EMAIL:dev@thepiratemax.local}
  credentials:
    encryption:
      secret: ${CREDENTIAL_ENCRYPTION_SECRET:the-pirate-max-local-credential-secret-2026}
      key-version: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:local-aesgcm-v1}
  integrations:
    mercado-pago:
      gateway: ${MERCADO_PAGO_GATEWAY:fake}
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
      webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
      base-url: ${MERCADO_PAGO_BASE_URL:https://api.mercadopago.com}
      notification-url: ${MERCADO_PAGO_NOTIFICATION_URL:}
      pix-expiration-minutes: ${MERCADO_PAGO_PIX_EXPIRATION_MINUTES:30}
  redis:
    credentials-delivery-queue: ${CREDENTIALS_DELIVERY_QUEUE:credentials.delivery}
  orders:
    expiration:
      scan-interval-ms: ${ORDER_EXPIRATION_SCAN_INTERVAL_MS:60000}
    delivery:
      scan-interval-ms: ${ORDER_DELIVERY_SCAN_INTERVAL_MS:15000}
