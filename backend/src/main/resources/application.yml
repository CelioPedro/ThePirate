spring:
  application:
    name: the-pirate-max-backend
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/the_pirate_max}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
app:
  dev:
    default-user-email: ${DEV_DEFAULT_USER_EMAIL:dev@thepiratemax.local}
  integrations:
    mercado-pago:
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
      webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
      base-url: ${MERCADO_PAGO_BASE_URL:https://api.mercadopago.com}
  redis:
    credentials-delivery-queue: ${CREDENTIALS_DELIVERY_QUEUE:credentials.delivery}
  orders:
    expiration:
      scan-interval-ms: ${ORDER_EXPIRATION_SCAN_INTERVAL_MS:60000}
    delivery:
      scan-interval-ms: ${ORDER_DELIVERY_SCAN_INTERVAL_MS:15000}
