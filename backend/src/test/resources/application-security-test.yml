spring:
  datasource:
    url: jdbc:h2:mem:thepiratemax-security;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
app:
  auth:
    enabled: true
    jwt:
      secret: security-test-secret-key-2026-security
      expiration-hours: 24
  credentials:
    encryption:
      secret: security-test-credential-secret-2026
      key-version: test-aesgcm-v1
  integrations:
    mercado-pago:
      gateway: fake
      access-token: test-token
      webhook-secret: test-secret
      base-url: https://api.mercadopago.com
      notification-url: https://thepiratemax.test/api/webhooks/mercadopago
      pix-expiration-minutes: 30
      payer-email: test@testuser.com
      payer-first-name: APRO
  redis:
    credentials-delivery-queue: credentials.delivery
